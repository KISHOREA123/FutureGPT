services:
  - type: web
    name: futuregpt
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    startCommand: "uvicorn app:fastapi_app --host 0.0.0.0 --port $PORT --workers 1"
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBHOOK_HOST
        sync: false
      - key: LOG_LEVEL
        value: INFO