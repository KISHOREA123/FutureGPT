version: "3.9"

services:
  coingpt_bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: coingpt_bot
    restart: unless-stopped

    # Load all env vars from your local .env file
    env_file:
      - .env

    # Optional: mount .env at runtime instead of baking it into the image
    # volumes:
    #   - ./.env:/app/.env:ro

    # Resource limits — adjust to your VPS specs
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          memory: 64M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Optional: Redis for persistent FSM state ──────────────────────────────
  # Uncomment and update RedisStorage in main.py to enable.
  #
  # redis:
  #   image: redis:7-alpine
  #   container_name: coingpt_redis
  #   restart: unless-stopped
